<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Photos - Downloads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .version {
            text-align: center;
            color: #667eea;
            margin-bottom: 40px;
            font-size: 1.1em;
            font-weight: 500;
        }

        .platforms {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .platform {
            flex: 1;
            min-width: 250px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .platform:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .platform-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .platform h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .platform p {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .download-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .download-link:hover {
            opacity: 0.9;
        }

        .download-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .info {
            text-align: center;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            color: #1976d2;
            font-size: 0.9em;
        }

        .error {
            background: #ffebee;
            color: #c62828;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .platforms {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Sorting Photos</h1>
        <div class="version" id="version">Downloading the latest version...</div>
        
        <div class="platforms">
            <div class="platform">
                <div class="platform-icon">🪟</div>
                <h2>Windows</h2>
                <p id="windows-desc">Searching for latest version...</p>
                <a id="windowsLink" class="download-link" href="#" download>Download .exe</a>
            </div>
            
            <div class="platform">
                <div class="platform-icon">🐧</div>
                <h2>Linux</h2>
                <p id="linux-desc">Searching for latest version...</p>
                <a id="linuxLink" class="download-link" href="#" download>Download .deb</a>
            </div>
        </div>
        
        <div class="info" id="info"></div>
    </div>

    <script>
        const owner = 'AndreevVE';
        const repo = 'Sorting_Photos_releases';
        
        // Функция для получения прямых ссылок на файлы через GitHub API
        async function getDirectFileUrl(folderPath, extension) {
            try {
                // Получаем содержимое папки
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folderPath}`);
                const files = await response.json();
                
                // Ищем файл с нужным расширением
                const targetFile = files.find(file => 
                    !file.name.startsWith('.') && 
                    file.name.toLowerCase().endsWith(extension)
                );
                
                if (targetFile) {
                    // Возвращаем прямую ссылку на raw-содержимое файла
                    return targetFile.download_url;
                }
                return null;
            } catch (error) {
                console.error(`Error fetching ${folderPath}:`, error);
                return null;
            }
        }
        
        // Функция для получения последней версии
        async function getLatestVersion(folderPath) {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folderPath}`);
                const folders = await response.json();
                
                // Фильтруем только папки и сортируем по имени (версии)
                const versions = folders
                    .filter(item => item.type === 'dir' && !item.name.startsWith('.'))
                    .sort((a, b) => b.name.localeCompare(a.name));
                
                return versions.length > 0 ? versions[0].name : null;
            } catch (error) {
                console.error(`Error fetching versions from ${folderPath}:`, error);
                return null;
            }
        }
        
        async function setupDownloads() {
            try {
                // Получаем последние версии
                const [latestWindowsVersion, latestLinuxVersion] = await Promise.all([
                    getLatestVersion('Windows'),
                    getLatestVersion('Linux')
                ]);
                
                // Обработка Windows
                if (latestWindowsVersion) {
                    const exeUrl = await getDirectFileUrl(`Windows/${latestWindowsVersion}`, '.exe');
                    
                    if (exeUrl) {
                        const windowsLink = document.getElementById('windowsLink');
                        windowsLink.href = exeUrl;
                        windowsLink.setAttribute('download', `Sorting_Photos_v${latestWindowsVersion}.exe`);
                        document.getElementById('windows-desc').innerHTML = `✅ Version ${latestWindowsVersion}<br><span style="font-size:0.85em;">Click to download .exe</span>`;
                    } else {
                        document.getElementById('windows-desc').innerHTML = `⚠️ Version ${latestWindowsVersion} found<br><span style="font-size:0.85em;">No .exe file found</span>`;
                        document.getElementById('windowsLink').classList.add('disabled');
                    }
                } else {
                    document.getElementById('windows-desc').textContent = '❌ No Windows versions found';
                    document.getElementById('windowsLink').classList.add('disabled');
                }
                
                // Обработка Linux
                if (latestLinuxVersion) {
                    const debUrl = await getDirectFileUrl(`Linux/${latestLinuxVersion}`, '.deb');
                    
                    if (debUrl) {
                        const linuxLink = document.getElementById('linuxLink');
                        linuxLink.href = debUrl;
                        linuxLink.setAttribute('download', `Sorting_Photos_v${latestLinuxVersion}.deb`);
                        document.getElementById('linux-desc').innerHTML = `✅ Version ${latestLinuxVersion}<br><span style="font-size:0.85em;">Click to download .deb</span>`;
                    } else {
                        document.getElementById('linux-desc').innerHTML = `⚠️ Version ${latestLinuxVersion} found<br><span style="font-size:0.85em;">No .deb file found</span>`;
                        document.getElementById('linuxLink').classList.add('disabled');
                    }
                } else {
                    document.getElementById('linux-desc').textContent = '❌ No Linux versions found';
                    document.getElementById('linuxLink').classList.add('disabled');
                }
                
                // Обновляем общую информацию о версии
                if (latestWindowsVersion || latestLinuxVersion) {
                    const latestVersion = [latestWindowsVersion, latestLinuxVersion].sort().reverse()[0];
                    document.getElementById('version').innerHTML = `✨ Latest version: ${latestVersion} ✨`;
                    document.getElementById('info').innerHTML = '💡 Click the button above to start downloading immediately';
                } else {
                    document.getElementById('version').textContent = '❌ No releases found';
                    document.getElementById('info').innerHTML = 'Please check back later for updates.';
                    document.getElementById('info').classList.add('error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('version').textContent = '❌ Failed to load releases';
                document.getElementById('info').innerHTML = 'Please check your internet connection or try again later.';
                document.getElementById('info').classList.add('error');
            }
        }
        
        // Запускаем загрузку данных
        setupDownloads();
    </script>
</body>
</html>
